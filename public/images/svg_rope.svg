<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0L8,4L0,8Z" fill="#666"/></marker>
<style>.t{font-size:13px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10.5px;fill:#666;text-anchor:middle}.lbl{font-size:11px;fill:#555;font-weight:600}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">旋转位置编码 RoPE 原理</text>

<!-- Left: Absolute PE (sin/cos added to embedding) -->
<text x="130" y="58" class="lbl" text-anchor="middle">❶ 绝对位置编码 (Absolute)</text>
<rect x="50" y="68" width="160" height="36" fill="#e3f2fd" stroke="#1565c0" rx="8"/>
<text x="130" y="91" class="t">Embedding x</text>
<line x1="130" y1="106" x2="130" y2="124" stroke="#666" stroke-width="1.5" marker-end="url(#r)"/>
<rect x="50" y="128" width="160" height="36" fill="#fff3e0" stroke="#e65100" rx="8"/>
<text x="130" y="151" class="t">+ PE(pos)  (相加)</text>
<line x1="130" y1="166" x2="130" y2="184" stroke="#666" stroke-width="1.5" marker-end="url(#r)"/>
<rect x="50" y="188" width="160" height="36" fill="#fce4ec" stroke="#880e4f" rx="8"/>
<text x="130" y="211" class="t">x + PE</text>
<text x="130" y="245" class="s">位置信息是「加」进去的常数</text>
<text x="130" y="260" class="s">外推性差，长序列表现下降</text>

<!-- Right: RoPE (rotate Q,K) -->
<text x="430" y="58" class="lbl" text-anchor="middle">❷ 旋转位置编码 RoPE (Relative)</text>
<rect x="350" y="68" width="160" height="36" fill="#e3f2fd" stroke="#1565c0" rx="8"/>
<text x="430" y="91" class="t">Q, K 向量</text>
<line x1="430" y1="106" x2="430" y2="124" stroke="#666" stroke-width="1.5" marker-end="url(#r)"/>
<rect x="350" y="128" width="160" height="36" fill="#fff3e0" stroke="#e65100" rx="8"/>
<text x="430" y="151" class="t">× R(pos)  (旋转)</text>
<line x1="430" y1="166" x2="430" y2="184" stroke="#666" stroke-width="1.5" marker-end="url(#r)"/>
<rect x="350" y="188" width="160" height="36" fill="#e8f5e9" stroke="#2e7d32" rx="8"/>
<text x="430" y="211" class="t">Q·K = f(pos_m - pos_n)</text>
<text x="430" y="245" class="s">注意力只依赖「相对位置」</text>
<text x="430" y="260" class="s">外推性好，长序列更稳定 ✓</text>

<!-- Rotation illustration (2D rotation) -->
<text x="280" y="290" text-anchor="middle" class="lbl">θ = pos · 10000^(-2i/d)  →  每个位置旋转不同角度</text>
<g transform="translate(280,315)">
  <circle cx="0" cy="0" r="18" fill="none" stroke="#bbb" stroke-dasharray="2,2"/>
  <line x1="0" y1="0" x2="14" y2="-12" stroke="#1565c0" stroke-width="2"/>
  <circle cx="14" cy="-12" r="3" fill="#1565c0"/>
  <text x="20" y="-8" font-size="9" fill="#1565c0">pos=1</text>
  <line x1="0" y1="0" x2="6" y2="-17" stroke="#e65100" stroke-width="2"/>
  <circle cx="6" cy="-17" r="3" fill="#e65100"/>
  <text x="12" y="-20" font-size="9" fill="#e65100">pos=2</text>
</g>
</svg>
