<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><marker id="p" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0L8,4L0,8Z" fill="#666"/></marker>
<style>.t{font-size:13px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10.5px;fill:#666;text-anchor:middle}.lbl{font-size:11px;fill:#555;font-weight:600}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">Prefill-Decode 分离 (PD Separation)</text>

<!-- Top: traditional mixed -->
<text x="280" y="56" class="lbl" text-anchor="middle">❶ 传统混合部署：Prefill 与 Decode 抢同一 GPU</text>
<rect x="100" y="66" width="360" height="48" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="10"/>
<rect x="110" y="74" width="160" height="32" fill="#fff3e0" stroke="#e65100" rx="6"/>
<text x="190" y="95" class="t">Prefill (算力密集)</text>
<rect x="290" y="74" width="160" height="32" fill="#e3f2fd" stroke="#1565c0" rx="6"/>
<text x="370" y="95" class="t">Decode (访存密集)</text>
<text x="280" y="128" class="s">互相干扰：Prefill 抢算力让 Decode 停顿，Decode 占显存让 Prefill 排队</text>

<!-- Bottom: separated -->
<text x="280" y="160" class="lbl" text-anchor="middle">❷ PD 分离：按资源特征分到不同 GPU/集群</text>
<rect x="60" y="172" width="200" height="58" fill="#fff3e0" stroke="#e65100" stroke-width="2" rx="10"/>
<text x="160" y="195" class="t">Prefill 集群</text>
<text x="160" y="213" class="s">高算力 GPU，并行算 KV Cache</text>
<text x="160" y="225" class="s">吞吐优先</text>

<rect x="300" y="172" width="200" height="58" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="10"/>
<text x="400" y="195" class="t">Decode 集群</text>
<text x="400" y="213" class="s">高带宽 GPU，逐 token 生成</text>
<text x="400" y="225" class="s">延迟优先</text>

<!-- KV Cache transfer arrow -->
<line x1="260" y1="201" x2="300" y2="201" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#p)"/>
<text x="280" y="190" text-anchor="middle" font-size="9.5" fill="#2e7d32" font-weight="600">KV Cache</text>
<text x="280" y="248" text-anchor="middle" class="s">传输已算好的 KV Cache 给 Decode 节点</text>

<text x="280" y="280" text-anchor="middle" class="lbl" fill="#2e7d32">✓ 收益：避免互相挤占 / 各自独立批处理 / 整体吞吐显著提升</text>
<text x="280" y="300" text-anchor="middle" class="s">挑战：KV Cache 网络传输开销 / 调度复杂度 / 需高速互联（RDMA）</text>
</svg>
