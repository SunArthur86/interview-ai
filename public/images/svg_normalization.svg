<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><style>.t{font-size:12.5px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10.5px;fill:#666;text-anchor:middle}.lbl{font-size:11.5px;fill:#555;font-weight:700;text-anchor:middle}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">归一化对比：BatchNorm vs LayerNorm vs RMSNorm</text>

<!-- BatchNorm -->
<text x="280" y="52" class="lbl">❶ BatchNorm（按「特征」归一化，跨样本）</text>
<text x="100" y="78" class="s">样本↓</text>
<text x="40" y="100" class="s">特征→</text>
<g font-family="monospace" font-size="11">
  <rect x="80" y="86" width="30" height="22" fill="#fff3e0" stroke="#e65100"/><text x="95" y="101" fill="#333">x₁₁</text>
  <rect x="110" y="86" width="30" height="22" fill="#fff3e0" stroke="#e65100"/><text x="125" y="101" fill="#333">x₁₂</text>
  <rect x="80" y="108" width="30" height="22" fill="#fff3e0" stroke="#e65100"/><text x="95" y="123" fill="#333">x₂₁</text>
  <rect x="110" y="108" width="30" height="22" fill="#fff3e0" stroke="#e65100"/><text x="125" y="123" fill="#333">x₂₂</text>
</g>
<rect x="76" y="82" width="68" height="50" fill="none" stroke="#c62828" stroke-width="2.5" stroke-dasharray="4,2" rx="4"/>
<text x="280" y="100" class="t" fill="#c62828">↑ 同一列(特征)一起算 μ/σ</text>
<text x="280" y="118" class="s">适合 CNN（固定 batch），NLP/序列模型效果差</text>

<!-- LayerNorm -->
<text x="280" y="155" class="lbl">❷ LayerNorm（按「样本」归一化，跨特征）</text>
<text x="100" y="180" class="s">样本↓</text>
<text x="40" y="202" class="s">特征→</text>
<g font-family="monospace" font-size="11">
  <rect x="80" y="188" width="30" height="22" fill="#e3f2fd" stroke="#1565c0"/><text x="95" y="203" fill="#333">x₁₁</text>
  <rect x="110" y="188" width="30" height="22" fill="#e3f2fd" stroke="#1565c0"/><text x="125" y="203" fill="#333">x₁₂</text>
  <rect x="80" y="210" width="30" height="22" fill="#e3f2fd" stroke="#1565c0"/><text x="95" y="225" fill="#333">x₂₁</text>
  <rect x="110" y="210" width="30" height="22" fill="#e3f2fd" stroke="#1565c0"/><text x="125" y="225" fill="#333">x₂₂</text>
</g>
<rect x="76" y="184" width="34" height="50" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="4,2" rx="4"/>
<text x="280" y="202" class="t" fill="#1565c0">↑ 同一行(样本)一起算 μ/σ</text>
<text x="280" y="220" class="s">不依赖 batch size，适合 NLP/Transformer（BERT/GPT 用）</text>

<!-- RMSNorm -->
<text x="280" y="258" class="lbl" fill="#2e7d32">❸ RMSNorm（LayerNorm 简化版，去均值，只除 RMS）</text>
<text x="280" y="275" class="s" fill="#2e7d32">公式：x / sqrt(mean(x²)) · γ，省去减均值，更快，LLaMA/Qwen 用</text>
</svg>
