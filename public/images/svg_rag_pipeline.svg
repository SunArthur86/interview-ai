<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><marker id="rp" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0L8,4L0,8Z" fill="#666"/></marker>
<style>.t{font-size:12px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10px;fill:#666;text-anchor:middle}.lbl{font-size:11.5px;fill:#555;font-weight:700;text-anchor:middle}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">RAG 进阶技术：Hybrid 检索 + Rerank + 查询改写</text>

<!-- Offline indexing (top) -->
<text x="280" y="56" class="lbl">❶ 离线索引（Indexing）</text>
<rect x="40" y="66" width="80" height="32" fill="#e8f5e9" stroke="#2e7d32" rx="6"/><text x="80" y="87" class="t">文档</text>
<line x1="120" y1="82" x2="150" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="150" y="66" width="80" height="32" fill="#fff3e0" stroke="#e65100" rx="6"/><text x="190" y="87" class="t">分块 Chunk</text>
<line x1="230" y1="82" x2="260" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="260" y="66" width="80" height="32" fill="#e3f2fd" stroke="#1565c0" rx="6"/><text x="300" y="87" class="t">Embedding</text>
<line x1="340" y1="82" x2="370" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="370" y="66" width="100" height="32" fill="#f3e5f5" stroke="#6a1b9a" rx="6"/><text x="420" y="87" class="t">向量库 + 关键词索引</text>
<text x="490" y="87" class="s" text-anchor="start">+元数据</text>

<!-- Online query (bottom) -->
<text x="280" y="130" class="lbl">❷ 在线检索（Retrieval）</text>
<rect x="40" y="140" width="80" height="32" fill="#e8f5e9" stroke="#2e7d32" rx="6"/><text x="80" y="161" class="t">用户Query</text>
<line x1="120" y1="156" x2="150" y2="156" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="150" y="140" width="90" height="32" fill="#fce4ec" stroke="#880e4f" rx="6"/><text x="195" y="161" class="t">查询改写</text>
<text x="195" y="185" class="s">HyDE/Multi-Query</text>
<line x1="240" y1="156" x2="270" y2="156" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="270" y="140" width="100" height="32" fill="#fff3e0" stroke="#e65100" rx="6"/><text x="320" y="158" class="t">混合检索</text>
<text x="320" y="172" class="s" font-size="9">向量 + BM25</text>
<line x1="370" y1="156" x2="400" y2="156" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="400" y="140" width="100" height="32" fill="#e3f2fd" stroke="#1565c0" rx="6"/><text x="450" y="161" class="t">Rerank 精排</text>

<!-- Top-K to context -->
<line x1="450" y1="172" x2="450" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<text x="470" y="195" class="s" text-anchor="start">Top-K</text>

<!-- Generation -->
<text x="280" y="232" class="lbl">❸ 生成（Generation）</text>
<rect x="150" y="242" width="120" height="34" fill="#e8eaf6" stroke="#283593" rx="6"/><text x="210" y="264" class="t">拼 Prompt（上下文+问题）</text>
<line x1="270" y1="259" x2="300" y2="259" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="300" y="242" width="80" height="34" fill="#e8f5e9" stroke="#2e7d32" rx="6"/><text x="340" y="264" class="t">LLM 生成</text>
<line x1="380" y1="259" x2="410" y2="259" stroke="#666" stroke-width="1.5" marker-end="url(#rp)"/>
<rect x="410" y="242" width="90" height="34" fill="#fff3e0" stroke="#e65100" rx="6"/><text x="455" y="264" class="t">带引用的回答</text>

<text x="280" y="305" class="s" fill="#2e7d32">进阶：增量更新（哈希检测变更）、多路召回融合（RRF）、过滤（元数据/权限）、缓存（语义缓存）</text>
<text x="280" y="322" class="s" fill="#c62828">常见问题：检索召回低、分块切断语义、幻觉、冷启动、多租户串数据</text>
</svg>
