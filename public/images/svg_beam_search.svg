<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><marker id="bs" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0L8,4L0,8Z" fill="#666"/></marker>
<style>.t{font-size:12px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10px;fill:#666;text-anchor:middle}.lbl{font-size:11px;fill:#555;font-weight:700;text-anchor:middle}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">解码策略：Greedy vs Beam Search vs Sampling</text>

<!-- Step labels -->
<text x="80" y="60" class="lbl">Step 1</text>
<text x="200" y="60" class="lbl">Step 2</text>
<text x="320" y="60" class="lbl">Step 3</text>
<text x="460" y="60" class="lbl">输出</text>

<!-- Greedy (top row) -->
<text x="30" y="95" class="lbl" fill="#2e7d32">Greedy</text>
<rect x="55" y="80" width="50" height="30" fill="#e8f5e9" stroke="#2e7d32" rx="5"/><text x="80" y="100" class="t">A</text>
<line x1="105" y1="95" x2="175" y2="95" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#bs)"/>
<rect x="175" y="80" width="50" height="30" fill="#e8f5e9" stroke="#2e7d32" rx="5"/><text x="200" y="100" class="t">B</text>
<line x1="225" y1="95" x2="295" y2="95" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#bs)"/>
<rect x="295" y="80" width="50" height="30" fill="#e8f5e9" stroke="#2e7d32" rx="5"/><text x="320" y="100" class="t">C</text>
<line x1="345" y1="95" x2="435" y2="95" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#bs)"/>
<rect x="435" y="80" width="60" height="30" fill="#c8e6c9" stroke="#2e7d32" rx="5"/><text x="465" y="100" class="t">A-B-C</text>
<text x="280" y="125" class="s" fill="#2e7d32">每步选概率最高 → 确定性，易重复/死板</text>

<!-- Beam Search (middle row) -->
<text x="30" y="170" class="lbl" fill="#e65100">Beam=2</text>
<rect x="55" y="155" width="50" height="26" fill="#fff3e0" stroke="#e65100" rx="5"/><text x="80" y="172" class="t">A(.5)</text>
<rect x="55" y="183" width="50" height="26" fill="#fff3e0" stroke="#e65100" rx="5"/><text x="80" y="200" class="t">B(.3)</text>
<text x="200" y="172" class="t">A→B(.45)</text>
<text x="200" y="200" class="t">A→C(.40)</text>
<text x="320" y="172" class="t">A→B→C(.36)</text>
<text x="320" y="200" class="t">A→C→D(.32)</text>
<rect x="435" y="155" width="60" height="26" fill="#ffe0b2" stroke="#e65100" rx="5"/><text x="465" y="172" class="t">A-B-C</text>
<text x="280" y="225" class="s" fill="#e65100">保留 top-k 路径 → 更优，但计算量大、仍可能重复</text>

<!-- Sampling (bottom row) -->
<text x="30" y="265" class="lbl" fill="#1565c0">Sampling</text>
<rect x="55" y="250" width="50" height="30" fill="#e3f2fd" stroke="#1565c0" rx="5"/><text x="80" y="270" class="t">B?</text>
<line x1="105" y1="265" x2="175" y2="265" stroke="#1565c0" stroke-width="1.5" marker-end="url(#bs)" stroke-dasharray="3,2"/>
<rect x="175" y="250" width="50" height="30" fill="#e3f2fd" stroke="#1565c0" rx="5"/><text x="200" y="270" class="t">D?</text>
<line x1="225" y1="265" x2="295" y2="265" stroke="#1565c0" stroke-width="1.5" marker-end="url(#bs)" stroke-dasharray="3,2"/>
<rect x="295" y="250" width="50" height="30" fill="#e3f2fd" stroke="#1565c0" rx="5"/><text x="320" y="270" class="t">E?</text>
<line x1="345" y1="265" x2="435" y2="265" stroke="#1565c0" stroke-width="1.5" marker-end="url(#bs)" stroke-dasharray="3,2"/>
<rect x="435" y="250" width="60" height="30" fill="#bbdefb" stroke="#1565c0" rx="5"/><text x="465" y="270" class="t">B-D-E</text>
<text x="280" y="300" class="s" fill="#1565c0">按概率分布随机采样 → 多样性强；Temperature 调尖锐度，Top-p 限制候选</text>
</svg>
