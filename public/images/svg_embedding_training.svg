<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" style="background:#f8f9fa;border-radius:12px;font-family:system-ui,sans-serif">
<defs><marker id="em" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0L8,4L0,8Z" fill="#666"/></marker>
<style>.t{font-size:12px;fill:#333;font-weight:600;text-anchor:middle}.s{font-size:10.5px;fill:#666;text-anchor:middle}.lbl{font-size:11.5px;fill:#555;font-weight:700;text-anchor:middle}</style></defs>
<text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700">Embedding 模型训练（对比学习 Contrastive Learning）</text>

<!-- Training objective -->
<text x="280" y="56" class="lbl">训练目标：拉近正例，推远负例</text>

<!-- Anchor + positives + negatives -->
<text x="100" y="92" class="lbl">Query (Anchor)</text>
<rect x="60" y="100" width="80" height="36" fill="#e3f2fd" stroke="#1565c0" rx="8"/><text x="100" y="123" class="t">"如何学Java"</text>

<line x1="140" y1="118" x2="200" y2="90" stroke="#2e7d32" stroke-width="2" marker-end="url(#em)"/>
<line x1="140" y1="118" x2="200" y2="150" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#em)"/>

<text x="320" y="80" class="lbl" fill="#2e7d32">正例 Positive</text>
<rect x="250" y="88" width="140" height="32" fill="#e8f5e9" stroke="#2e7d32" rx="8"/><text x="320" y="109" class="t">"Java 入门方法"</text>

<text x="320" y="140" class="lbl" fill="#c62828">负例 Negative</text>
<rect x="250" y="148" width="140" height="32" fill="#ffebee" stroke="#c62828" rx="8"/><text x="320" y="169" class="t">"今天天气不错"</text>

<!-- Vector space -->
<text x="480" y="92" class="lbl">向量空间</text>
<circle cx="470" cy="105" r="8" fill="#1565c0"/>
<text x="455" y="108" font-size="9" fill="#1565c0" text-anchor="end">Q</text>
<circle cx="495" cy="92" r="8" fill="#2e7d32"/>
<text x="510" y="95" font-size="9" fill="#2e7d32">正↑</text>
<circle cx="500" cy="135" r="8" fill="#c62828"/>
<text x="515" y="138" font-size="9" fill="#c62828">负↓</text>
<text x="480" y="160" class="s">cos(Q,正)→大</text>
<text x="480" y="175" class="s">cos(Q,负)→小</text>

<!-- Loss -->
<text x="280" y="215" class="lbl">InfoNCE 损失（拉近正例、推远所有负例）</text>
<rect x="120" y="225" width="320" height="34" fill="#fff3e0" stroke="#e65100" rx="8"/>
<text x="280" y="247" class="t" font-family="monospace">L = -log[ exp(sim(Q,正)/τ) / Σ exp(sim(Q,i)/τ) ]</text>
<text x="280" y="278" class="s">τ 为温度系数；负例越多（in-batch negatives）效果越好，但计算量增加</text>
</svg>
